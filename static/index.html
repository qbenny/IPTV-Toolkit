<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/static/">
    <title>IPTV & VOD 管理面板</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tokens.css?v=2.4">
    <link rel="stylesheet" href="css/style.css?v=2.4">
    <script src="js/vue.global.js"></script>
</head>
<body>
    <div id="app" class="app" v-cloak>
        <!-- 侧边栏导航 -->
        <sidebar-nav :active-tab="activeTab" :theme="theme" @nav="activeTab = $event" @toggle-theme="toggleTheme"></sidebar-nav>

        <!-- 主体内容区域 -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1>{{ tabTitles[activeTab] }}</h1>
                    <p class="header-subtitle">{{ tabSubtitles[activeTab] }}</p>
                </div>
                <transition name="fade-slide" mode="out-in">
                    <div v-if="activeTab === 'vod'" class="api-links-panel" key="vod">
                        <div class="api-link-item">
                            <span class="api-link-label">📦 TVBox 订阅</span>
                            <code class="api-link-url" :title="vodApiLinks.tvbox">{{ vodApiLinks.tvbox }}</code>
                            <button class="api-copy-btn" @click="copyToClipboard(vodApiLinks.tvbox, showToast)" title="复制 TVBox 订阅链接">📋</button>
                        </div>
                        <div class="api-link-item">
                            <span class="api-link-label">🔗 VOD API</span>
                            <code class="api-link-url" :title="vodApiLinks.api">{{ vodApiLinks.api }}</code>
                            <button class="api-copy-btn" @click="copyToClipboard(vodApiLinks.api, showToast)" title="复制 VOD API 链接">📋</button>
                        </div>
                    </div>
                    <div v-else-if="activeTab === 'live'" class="api-links-panel" key="live">
                        <div class="api-link-item">
                            <span class="api-link-label">📺 M3U 订阅链接</span>
                            <code class="api-link-url" :title="liveM3uUrl">{{ liveM3uUrl }}</code>
                            <button class="api-copy-btn" @click="copyToClipboard(liveM3uUrl, showToast)" title="复制 M3U 订阅链接">📋</button>
                        </div>
                    </div>
                    <div v-else-if="activeTab === 'epg'" class="api-links-panel" key="epg">
                        <div class="api-link-item">
                            <span class="api-link-label">📅 EPG 地址</span>
                            <code class="api-link-url" :title="epgXmlLink">{{ epgXmlLink }}</code>
                            <button class="api-copy-btn" @click="copyToClipboard(epgXmlLink, showToast)" title="复制 EPG 地址">📋</button>
                        </div>
                    </div>
                </transition>
            </header>

            <!-- 提示信息通知 -->
            <toast-notification ref="toastRef"></toast-notification>

            <!-- 板块一：系统配置 -->
            <stb-tab v-if="activeTab === 'stb'"></stb-tab>

            <!-- 板块二：VOD 点播管理 -->
            <vod-tab v-if="activeTab === 'vod'"></vod-tab>

            <!-- 板块四：直播频道管理 -->
            <live-tab v-if="activeTab === 'live'"></live-tab>

            <!-- 板块五：EPG 节目管理 -->
            <epg-tab v-if="activeTab === 'epg'"></epg-tab>
        </main>
    </div>

    <script src="js/Sortable.min.js"></script>
    <script src="js/api/client.js"></script>
    <script src="js/api/stbService.js"></script>
    <script src="js/api/vodService.js"></script>
    <script src="js/api/epgService.js"></script>
    <script src="js/api/liveService.js"></script>
    <script src="js/components/shared/clipboard.js"></script>
    <script src="js/components/shared/ToastNotification.js"></script>
    <script src="js/components/shared/ColorPicker.js"></script>
    <script src="js/components/shared/SidebarNav.js"></script>
    <script src="js/components/StbTab.js"></script>
    <script src="js/components/VodTab.js"></script>
    <script src="js/components/EpgTab.js"></script>
    <script src="js/components/LiveTab.js"></script>
    <script src="js/app.js?v=2.1"></script>
</body>
</html>
